version: "3.8"

services:

  compute_service:
    build: ./backEnd/services/compute_service
    container_name: compute_service
    volumes:
      - ./backEnd/services/compute_service/genomes:/app/genomes
    environment:
      - GENOMES_PATH=/app/genomes
    ports:
      - "8001:8001"
    networks:
      - blast_net

  gateway_service:
    build: ./backEnd/services/gateway_service
    container_name: gateway_service
    ports:
      - "8000:8000"
    depends_on:
      - compute_service
    networks:
      - blast_net

networks:
  blast_net:
    driver: bridge

